<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Tools - Saturn FPV</title>
    <link rel="stylesheet" href="css/fonts.css">
    <style>
        :root {
            --black: #0A0A0B;
            --dark: #111113;
            --card: #18181B;
            --card-hover: #1E1E22;
            --border: #27272A;
            --text: #FAFAFA;
            --text-muted: #A1A1AA;
            --text-dim: #71717A;
            --orange: #E8722A;
            --blue: #3B7BF6;
            --blue-glow: rgba(59, 123, 246, 0.2);
            --orange-glow: rgba(232, 114, 42, 0.2);
            --header-height: 50px;
            --header-bg: rgba(10, 10, 11, 0.85);
            --help-panel-bg: rgba(20, 20, 22, 0.95);
            --drawer-bg: rgba(24, 24, 27, 0.95);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --active-item-bg: rgba(232, 114, 42, 0.06);
            --active-item-border: rgba(232, 114, 42, 0.15);
        }

        body.light-theme {
            --black: #F4F4F5;
            --dark: #E4E4E7;
            --card: #FFFFFF;
            --card-hover: #F4F4F5;
            --border: #D4D4D8;
            --text: #09090B;
            --text-muted: #27272A;
            --text-dim: #71717A;
            --header-bg: rgba(244, 244, 245, 0.85);
            --help-panel-bg: rgba(228, 228, 231, 0.95);
            --drawer-bg: rgba(228, 228, 231, 0.95);
            --hover-bg: rgba(9, 9, 11, 0.08);
            --active-item-bg: rgba(232, 114, 42, 0.08);
            --active-item-border: rgba(232, 114, 42, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--black);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(var(--header-height) + env(safe-area-inset-top, 0px));
            padding-top: env(safe-area-inset-top, 0px);
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            z-index: 100;
        }

        /* Left Logo Area */
        .brand-logo {
            height: 34px;
            width: 34px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .brand-logo:hover {
            transform: scale(1.08);
        }
        .brand-logo img {
            height: 100%;
            width: 100%;
            display: block;
            border-radius: 6px;
        }

        /* Centered App Title */
        .app-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }
        .app-title:hover {
            opacity: 0.85;
        }
        .app-title span {
            background: linear-gradient(135deg, var(--orange) 0%, #ff8c42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 0.2rem;
        }

        /* Right Nav Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .btn-help {
            color: var(--blue);
            background: rgba(59, 123, 246, 0.08);
            border: 1px solid rgba(59, 123, 246, 0.15);
        }
        .btn-help:hover {
            background: rgba(59, 123, 246, 0.18);
            box-shadow: 0 0 12px var(--blue-glow);
            transform: scale(1.05);
        }
        .btn-menu {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }
        .btn-menu:hover {
            background: var(--hover-bg);
            border-color: var(--text-muted);
            transform: scale(1.05);
        }
        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            stroke: currentColor;
            stroke-width: 0.5;
        }

        /* ── MAIN CONTENT VIEW (IFRAME CONTAINER) ── */
        .view-container {
            width: 100%;
            height: 100%;
            padding-top: calc(var(--header-height) + env(safe-area-inset-top, 0px));
            position: relative;
        }
        #app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--black);
        }

        /* ── HELPER/OVERLAYS ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* 1. Slide-down Help Panel */
        .help-panel {
            position: fixed;
            top: -100%;
            left: 0;
            right: 0;
            max-height: 85vh;
            background: var(--help-panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            padding-top: env(safe-area-inset-top, 0px);
            display: flex;
            flex-direction: column;
            transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .help-panel.open {
            top: 0;
        }
        .help-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .help-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .help-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-muted);
        }
        .help-content strong {
            color: var(--text);
        }
        .help-close-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .help-close-btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
            background: var(--hover-bg);
        }

        /* 2. Slide-in Tools Menu Drawer */
        .drawer-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: var(--drawer-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-left: 1px solid var(--border);
            padding-top: env(safe-area-inset-top, 0px);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 40px rgba(0,0,0,0.5);
        }
        .drawer-menu.open {
            right: 0;
        }
        .drawer-header {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text);
            text-transform: uppercase;
        }
        .drawer-header h2 span {
            color: var(--orange);
        }
        .drawer-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .drawer-close:hover {
            color: var(--text);
        }
        .drawer-item-about {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            transition: all 0.2s;
            color: var(--text-dim);
            outline: none;
        }
        .drawer-item-about:hover, .drawer-item-about.active {
            color: var(--orange) !important;
        }
        .drawer-links {
            list-style: none;
            padding: 1rem 0;
            overflow-y: auto;
            flex: 1;
        }
        .drawer-item {
            padding: 0.15rem 0.75rem;
        }
        .drawer-item a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .drawer-item a:hover, .drawer-item.active a {
            color: var(--text);
            background: var(--active-item-bg);
            border-color: var(--active-item-border);
        }
        .drawer-item.active a {
            background: var(--active-item-bg);
            border-color: var(--orange);
            font-weight: 600;
        }
        .drawer-item .tool-icon {
            font-size: 1.15rem;
            min-width: 24px;
            text-align: center;
        }

        @media (max-width: 480px) {
            header {
                padding: 0 0.5rem;
            }
            .brand-logo {
                height: 30px;
                width: 30px;
            }
            .app-title {
                font-size: 0.85rem;
                letter-spacing: 0.03em;
            }
            .header-actions {
                gap: 0.5rem;
            }
            .action-btn {
                width: 32px;
                height: 32px;
            }
            .action-btn svg {
                width: 16px;
                height: 16px;
            }
        }

        @media (min-width: 1024px) {
            /* Keep drawer permanently open on the right */
            .drawer-menu {
                position: fixed;
                top: calc(var(--header-height) + env(safe-area-inset-top, 0px));
                right: 0 !important;
                width: 300px;
                height: calc(100% - var(--header-height) - env(safe-area-inset-top, 0px));
                border-left: 1px solid var(--border);
                border-top: none;
                box-shadow: none;
                background: var(--dark);
                transform: none !important;
            }
            /* Hide drawer close button */
            .drawer-close {
                display: none !important;
            }
            /* Hide the hamburger menu button in the header */
            .btn-menu {
                display: none !important;
            }
            /* Shrink content frame to make room for the persistent sidebar */
            .view-container {
                width: calc(100% - 300px);
            }
            /* Shrink help panel to align with the active content area */
            .help-panel {
                width: calc(100% - 300px) !important;
            }
        }

        /* ── THEME TOGGLE CONTROLS ── */
        .theme-switch-slider {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 22px;
        }
        .theme-switch-slider input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: var(--border);
            transition: .25s ease;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 4px;
            bottom: 4px;
            background-color: var(--text-dim);
            transition: .25s ease;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: rgba(59, 123, 246, 0.15);
            border: 1px solid rgba(59, 123, 246, 0.3);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
            background-color: var(--blue);
        }
        .drawer-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--dark);
        }
        .theme-btn-a {
            background: none;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            transition: all 0.2s;
            color: var(--text);
        }
        .theme-btn-a:hover {
            border-color: var(--text-muted);
            background: var(--hover-bg);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- STICKY HEADER -->
    <header>
        <div class="brand-logo" onclick="goHome()" title="Back to Dashboard">
            <img id="logo-img" src="app_icon.png" alt="Saturn FPV">
        </div>
        <div class="app-title" onclick="goHome()"><span>SATURN</span> FPV Tools</div>
        <div class="header-actions">
            <!-- Blue Question Mark Button -->
            <button class="action-btn btn-help" onclick="toggleHelp()" title="Help & Details">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </button>
            <!-- 3 Stripe Burger Menu Button -->
            <button class="action-btn btn-menu" onclick="toggleDrawer()" title="Select Tool">
                <svg viewBox="0 0 24 24">
                    <line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- CONTENT FRAME -->
    <div class="view-container">
        <iframe id="app-iframe" src="menu.html" name="app-iframe"></iframe>
    </div>

    <!-- OVERLAY SHADOW -->
    <div class="overlay" id="app-overlay" onclick="closeAllOverlays()"></div>

    <!-- HELP SLIDE PANEL (from top) -->
    <div class="help-panel" id="help-panel">
        <div class="help-header">
            <h2><span>?</span> Tool Documentation</h2>
            <button class="help-close-btn" onclick="toggleHelp()">Close</button>
        </div>
        <div class="help-content" id="help-content">
            <!-- Dynamic Help Content Injected Here -->
        </div>
    </div>

    <!-- BURGER MENU DRAWER (from right) -->
    <div class="drawer-menu" id="drawer-menu">
        <div class="drawer-header">
            <h2><span>FPV</span> Tools</h2>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <button id="menu-about" class="drawer-item-about" onclick="selectDrawerTool('about.html', 'about')" title="About FPV Tools">
                    <span style="font-size: 1.15rem; line-height: 1;">ℹ️</span>
                </button>
                <button class="drawer-close" onclick="toggleDrawer()">&times;</button>
            </div>
        </div>
        <ul class="drawer-links">
            <li class="drawer-item active" id="menu-home" onclick="selectDrawerTool('menu.html', 'home')">
                <a href="#"><span class="tool-icon">📊</span>Dashboard</a>
            </li>
            <li style="border-bottom: 1px solid var(--border); margin: 0.5rem 1rem 0.75rem 1rem; list-style: none;"></li>
            <li style="margin: 0.75rem 1rem 0.5rem 1rem; font-size: 0.6875rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; list-style: none;">Tools</li>
            <li class="drawer-item" id="menu-rate" onclick="selectDrawerTool('html tools/rate-converter.html', 'rate')">
                <a href="#"><span class="tool-icon">📈</span>Rate Converter</a>
            </li>
            <li class="drawer-item" id="menu-tpa" onclick="selectDrawerTool('html tools/tpa-comparison.html', 'tpa')">
                <a href="#"><span class="tool-icon">📉</span>TPA Comparison</a>
            </li>
            <li class="drawer-item" id="menu-current" onclick="selectDrawerTool('html tools/sensor-calibration.html', 'current')">
                <a href="#"><span class="tool-icon">⚡</span>Sensor Calibration</a>
            </li>
            <li class="drawer-item" id="menu-stator" onclick="selectDrawerTool('html tools/stator-volume.html', 'stator')">
                <a href="#"><span class="tool-icon">⚙️</span>Stator Volume</a>
            </li>
            <li class="drawer-item" id="menu-pid" onclick="selectDrawerTool('html tools/pid-simulator.html', 'pid')">
                <a href="#"><span class="tool-icon">🎮</span>PID Simulator</a>
            </li>
            <li class="drawer-item" id="menu-speed" onclick="selectDrawerTool('html tools/prop-tip-speed.html', 'speed')">
                <a href="#"><span class="tool-icon">🌀</span>Prop Tip Speed</a>
            </li>
            <li class="drawer-item" id="menu-freq" onclick="selectDrawerTool('html tools/frequency-planner.html', 'freq')">
                <a href="#"><span class="tool-icon">📡</span>Frequency Planner</a>
            </li>
            <li class="drawer-item" id="menu-telemetry" onclick="selectDrawerTool('html tools/telemetry-parser.html', 'telemetry')">
                <a href="#"><span class="tool-icon">🗺️</span>Telemetry Parser</a>
            </li>
        </ul>
        <div class="drawer-footer" style="padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; background: var(--dark); border-top: 1px solid var(--border);">
            <span style="font-size: 0.9rem; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">🌓 Dark Mode</span>
            <label class="theme-switch-slider">
                <input type="checkbox" id="theme-slider-input" checked onchange="onSliderThemeChange(this)">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- DYNAMIC HELP CONTENT STORAGE -->
    <script>
        const helpData = {
            home: `
                <p>Welcome to <strong>FPV Tools</strong> by Saturn FPV!</p><br>
                <p>This offline application gathers the most critical calculators and simulators needed for dialing in your FPV multirotor's performance. Open the drawer menu (top right) or select a tile on the main dashboard to launch a tool.</p><br>
                <p><strong>Available Tools:</strong></p>
                <ul style="list-style: disc; padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li><strong>Rate Converter:</strong> Compare rate curves across Actual, Betaflight, KISS, Quick, and RaceFlight, and best-fit curves automatically.</li>
                    <li><strong>TPA Comparison:</strong> Visualize throttle PID attenuation and breakpoint configurations to tame high-throttle vibrations.</li>
                    <li><strong>Sensor Calibration:</strong> Calibrate your FC's amperage and VBAT scale based on real flight log vs. charger values.</li>
                    <li><strong>Stator Volume:</strong> Compare torque capacities and weights across standard motor dimensions.</li>
                    <li><strong>PID Simulator:</strong> Interactive math-model axis simulator with real-time blackbox scope and motor heat metrics.</li>
                    <li><strong>Prop Tip Speed:</strong> Calculate tip speeds, transonic Mach number efficiency zones, and no-load RPM.</li>
                    <li><strong>Frequency Planner:</strong> Plan multi-pilot analog/digital heats cleanly without intermodulation distortion conflicts.</li>
                    <li><strong>Telemetry Parser:</strong> Load EdgeTX logs to generate path maps, altitudes, speeds, and Google Earth track coordinates.</li>
                </ul>
            `,
            rate: `
                <p><strong>Rate Converter Help</strong></p><br>
                <p>Compare and convert rate curves across Actual, Betaflight, Quick, KISS, and RaceFlight rate models. This allows you to recreate the exact stick feel when moving between different flight controllers or firmware versions.</p><br>
                <p><strong>How to use:</strong></p>
                <ul style="list-style: disc; padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li>Set your rates in the target curve using the sliders or numerical inputs.</li>
                    <li>To convert one curve model to another, choose your preferred target model in the "To:" select box at the bottom of the panel, and click <strong>Convert</strong>.</li>
                    <li>A hybrid coarse/fine grid search algorithm will run in the background to automatically find the mathematically closest rates under that model, matching the source curve's center sensitivity and maximum rates.</li>
                </ul>
            `,
            tpa: `
                <p><strong>TPA Comparison Help</strong></p><br>
                <p>TPA (Throttle PID Attenuation) reduces PID gains at high throttle ranges to prevent mid-to-high throttle oscillations (often heard as high-frequency warbling or flutter at full punch-outs).</p><br>
                <p><strong>Understanding the inputs:</strong></p>
                <ul style="list-style: disc; padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li><strong>TPA Rate:</strong> The percentage by which the P and D gains are reduced at 100% throttle. E.g., a rate of 0.65 reduces your gains by 65% (PIDs retain 35% strength).</li>
                    <li><strong>Breakpoint:</strong> The throttle value (in microseconds, from 1000 to 2000) where the attenuation starts. Below this breakpoint, PIDs retain 100% strength.</li>
                    <li>Use the dual control panels to overlay two different TPA profiles and compare how rapidly and aggressively they attenuate your gains.</li>
                </ul>
            `,
            current: `
                <p><strong>Sensor Calibration Help</strong></p><br>
                <p>This utility helps you calibrate your flight controller's internal current sensor and voltage dividers to guarantee accurate battery status telemetry and reliable mAh consumption readings.</p><br>
                <p><strong>Current Sensor Steps:</strong></p>
                <ol style="padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li>Fly a pack and record the **mAh consumed** reported by your OSD/Configurator.</li>
                    <li>Put the battery on a charger and record the **mAh replaced** (charged).</li>
                    <li>Record your current **Betaflight Current Scale** (default is usually 400).</li>
                    <li>Click Calculate and paste the resulting ` + "`set current_meter_scale`" + ` CLI command into the Betaflight console.</li>
                </ol><br>
                <p><strong>Voltage Sensor Steps:</strong></p>
                <ol style="padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li>Measure active battery voltage with a multimeter while connected to the quad.</li>

            pid: `
                <p><strong>PID Simulator Help</strong></p><br>
                <p>Based on Joshua Bardwell's PID Tuning Masterclass, this tool simulates a single drone axis to help you build an intuitive feel for how each gain and physics parameter affects flight dynamics.</p><br>
                
                <p><strong>Core Concepts (PID & FF):</strong></p>
                <ul style="list-style: disc; padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li><strong>P (Proportional):</strong> Reacts to the present. Drives the follower toward the setpoint. Excess P causes ringing, overshoot, and rapid oscillations.</li>
                    <li><strong>I (Integral):</strong> Reacts to the past. Corrects persistent offsets (like unbalanced CG or side winds) by accumulating force over time.</li>
                    <li><strong>D (Derivative):</strong> Reacts to the future. Dampens acceleration and decelerates the follower as it approaches the setpoint. Excess D causes high-frequency noise amplification, heating up motors.</li>
                    <li><strong>FF (Feedforward):</strong> Reacts to stick velocity. Instantly adds force during stick movement to eliminate gyro latency, dropping to zero when stick stops.</li>
                    <li><strong>The Scope (Blackbox Log):</strong> The real-time Scope simulates a flight controller's Blackbox log. It records and plots Setpoint (stick input), Follower (gyro rotation), Error, and individual PID/FF trace lines so you can diagnose controller behaviors exactly like analyzing real flight logs.</li>
                </ul><br>

                <p><strong>Tuning Approach (How to Use):</strong></p>
                <ol style="padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li><strong>Zero Out Gains:</strong> Turn P, I, D, and FF all the way to 0 to observe the "broken" system (the follower won't move).</li>
                    <li><strong>Find P Limit:</strong> Raise P until the follower matches the setpoint. Note how P-only causes endless overshoot and oscillations (undamped ringing).</li>
                    <li><strong>Add D to Damp:</strong> Raise D to act as a brake. It counteracts P's momentum, damping the overshoot and stabilizing the line.</li>
                    <li><strong>Set I for Bias:</strong> Turn up CG (disturbance) to simulate wind or an off-center battery. Note how the follower drifts. Turn up I to correct this steady-state error.</li>
                    <li><strong>Snappiness with FF:</strong> Notice the delay between moving the target and the follower responding (due to physics/loop delay). Raise FF to inject a kick based on stick speed, making the response snappy and eliminating latency.</li>
                </ol><br>

                <p><strong>Physics Parameters:</strong></p>
                <ul style="list-style: disc; padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li><strong>Mass:</strong> Weight of the craft. Higher mass slows down response and demands higher P/D gains.</li>
                    <li><strong>Drag:</strong> Air resistance. Higher drag acts as natural damping (like D) but requires more continuous thrust to maintain rates.</li>
                    <li><strong>Delay:</strong> Latency in the loop (control calculations & ESC latency). <em>Critical: Higher delay makes the system highly unstable and prone to oscillation, limiting your maximum gains!</em></li>
                    <li><strong>Noise:</strong> Gyro electrical/mechanical vibration. Amplified by high D-term gains, leading to excess "Motor Heat".</li>
                    <li><strong>CG (Disturbance):</strong> Unbalanced mass/constant force. Requires I-term to prevent steady-state drift.</li>
                </ul><br>

                <p><strong>Interpreting Step Response:</strong></p>
                <ul style="list-style: disc; padding-left: 1.5rem; margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem;">
                    <li><strong>Rise Time:</strong> Snappiness. Time taken to climb from 10% to 90% of setpoint.</li>
                    <li><strong>Overshoot:</strong> Bounce. Percentage by which the follower exceeds the setpoint. Try to keep this minimal (&lt; 5%).</li>
                    <li><strong>Settle Time:</strong> Lock-in. Time required for oscillations to decay within 2% of setpoint.</li>
                    <li><strong>SS Error:</strong> Drift. The steady-state gap left when control inputs stop. Corrected by I.</li>
                </ul>
            `,

        let currentActiveTool = 'home';

        function goHome() {
            if (currentActiveTool !== 'home') {
                document.getElementById('app-iframe').src = 'menu.html';
                updateActiveDrawer('home');
            }
            closeAllOverlays();
        }

        function toggleHelp() {
            const panel = document.getElementById('help-panel');
            const overlay = document.getElementById('app-overlay');
            const isOpen = panel.classList.contains('open');

            if (isOpen) {
                panel.classList.remove('open');
                overlay.classList.remove('visible');
            } else {
                // Load help text based on current active tool
                document.getElementById('help-content').innerHTML = helpData[currentActiveTool] || helpData.home;
                panel.classList.add('open');
                overlay.classList.add('visible');
                // Close drawer if open
                document.getElementById('drawer-menu').classList.remove('open');
            }
        }

        function toggleDrawer() {
            const drawer = document.getElementById('drawer-menu');
            const overlay = document.getElementById('app-overlay');
            const isOpen = drawer.classList.contains('open');

            if (isOpen) {
                drawer.classList.remove('open');
                overlay.classList.remove('visible');
            } else {
                drawer.classList.add('open');
                overlay.classList.add('visible');
                // Close help if open
                document.getElementById('help-panel').classList.remove('open');
            }
        }

        function closeAllOverlays() {
            document.getElementById('help-panel').classList.remove('open');
            document.getElementById('drawer-menu').classList.remove('open');
            document.getElementById('app-overlay').classList.remove('visible');
        }

        function updateActiveDrawer(key) {
            currentActiveTool = key;
            document.querySelectorAll('.drawer-item, .drawer-item-about').forEach(item => {
                item.classList.remove('active');
            });
            const activeItem = document.getElementById('menu-' + key);
            if (activeItem) activeItem.classList.add('active');
        }

        function selectDrawerTool(src, key) {
            document.getElementById('app-iframe').src = src;
            updateActiveDrawer(key);
            closeAllOverlays();
        }

        // Catch messages from iframe when tool changes internally
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'pageChange') {
                updateActiveDrawer(event.data.key);
            }
        });

        // ── THEME SWITCH SYSTEM ──
        let currentTheme = localStorage.getItem('fpv-tools-theme');
        if (!currentTheme) {
            currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('fpv-tools-theme', theme);

            // Update DOM class
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }

            // Sync Android native system bars if available
            if (window.AndroidBridge && window.AndroidBridge.updateTheme) {
                window.AndroidBridge.updateTheme(theme);
            }

            // Sync Option B Slider Toggle Checkbox
            const slider = document.getElementById('theme-slider-input');
            if (slider) {
                slider.checked = (theme === 'dark');
            }

            // Propagate theme change to active iframe
            const iframe = document.getElementById('app-iframe');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'setTheme', theme: theme }, '*');
            }
        }

        function onSliderThemeChange(checkbox) {
            const nextTheme = checkbox.checked ? 'dark' : 'light';
            applyTheme(nextTheme);
        }

        // On load event
        document.addEventListener('DOMContentLoaded', function() {
            applyTheme(currentTheme);
        });

        // Ensure theme is synced with the native bridge once the window is fully loaded (and the bridge is injected)
        window.addEventListener('load', function() {
            if (window.AndroidBridge && window.AndroidBridge.updateTheme) {
                window.AndroidBridge.updateTheme(currentTheme);
            }
        });

        // Whenever the iframe finishes loading, push active theme configuration to it
        document.getElementById('app-iframe').addEventListener('load', function() {
            this.contentWindow.postMessage({ type: 'setTheme', theme: currentTheme }, '*');
        });
    </script>
</body>
