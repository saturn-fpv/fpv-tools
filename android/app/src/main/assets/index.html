<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Tools - Saturn FPV</title>
    <link rel="stylesheet" href="css/fonts.css">
    <style>
        :root {
            --black: #0A0A0B;
            --dark: #111113;
            --card: #18181B;
            --card-hover: #1E1E22;
            --border: #27272A;
            --text: #FAFAFA;
            --text-muted: #A1A1AA;
            --text-dim: #71717A;
            --orange: #E8722A;
            --blue: #3B7BF6;
            --blue-glow: rgba(59, 123, 246, 0.2);
            --orange-glow: rgba(232, 114, 42, 0.2);
            --header-height: 50px;
            --header-bg: rgba(10, 10, 11, 0.85);
            --help-panel-bg: rgba(20, 20, 22, 0.95);
            --drawer-bg: rgba(24, 24, 27, 0.95);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --active-item-bg: rgba(232, 114, 42, 0.06);
            --active-item-border: rgba(232, 114, 42, 0.15);
        }

        body.light-theme {
            --black: #F4F4F5;
            --dark: #E4E4E7;
            --card: #FFFFFF;
            --card-hover: #F4F4F5;
            --border: #D4D4D8;
            --text: #09090B;
            --text-muted: #27272A;
            --text-dim: #71717A;
            --header-bg: rgba(244, 244, 245, 0.85);
            --help-panel-bg: rgba(228, 228, 231, 0.95);
            --drawer-bg: rgba(228, 228, 231, 0.95);
            --hover-bg: rgba(9, 9, 11, 0.08);
            --active-item-bg: rgba(232, 114, 42, 0.08);
            --active-item-border: rgba(232, 114, 42, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--black);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: calc(var(--header-height) + env(safe-area-inset-top, 0px));
            padding-top: env(safe-area-inset-top, 0px);
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            z-index: 100;
        }

        /* Left Logo Area */
        .brand-logo {
            height: 34px;
            width: 34px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .brand-logo:hover {
            transform: scale(1.08);
        }
        .brand-logo img {
            height: 100%;
            width: 100%;
            display: block;
            border-radius: 6px;
        }

        /* Centered App Title */
        .app-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }
        .app-title:hover {
            opacity: 0.85;
        }
        .app-title span {
            background: linear-gradient(135deg, var(--orange) 0%, #ff8c42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 0.2rem;
        }

        /* Right Nav Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .btn-help {
            color: var(--blue);
            background: rgba(59, 123, 246, 0.08);
            border: 1px solid rgba(59, 123, 246, 0.15);
        }
        .btn-help:hover {
            background: rgba(59, 123, 246, 0.18);
            box-shadow: 0 0 12px var(--blue-glow);
            transform: scale(1.05);
        }
        .btn-menu {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }
        .btn-menu:hover {
            background: var(--hover-bg);
            border-color: var(--text-muted);
            transform: scale(1.05);
        }
        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            stroke: currentColor;
            stroke-width: 0.5;
        }

        /* ── MAIN CONTENT VIEW (IFRAME CONTAINER) ── */
        .view-container {
            width: 100%;
            height: 100%;
            padding-top: calc(var(--header-height) + env(safe-area-inset-top, 0px));
            position: relative;
        }
        #app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--black);
        }

        /* ── HELPER/OVERLAYS ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* 1. Slide-down Help Panel */
        .help-panel {
            position: fixed;
            top: -100%;
            left: 0;
            right: 0;
            max-height: 85vh;
            background: var(--help-panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            padding-top: env(safe-area-inset-top, 0px);
            display: flex;
            flex-direction: column;
            transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .help-panel.open {
            top: 0;
        }
        .help-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .help-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .help-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-muted);
        }
        .help-content strong {
            color: var(--text);
        }
        .help-close-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .help-close-btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
            background: var(--hover-bg);
        }

        /* About modal custom styling nested in .help-content */
        .help-content .about-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .help-content .about-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .help-content .about-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FFF 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.light-theme .help-content .about-header h1 {
            background: linear-gradient(135deg, #09090B 0%, #3F3F46 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .help-content .about-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .help-content .card-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .help-content .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .help-content .card:hover {
            border-color: var(--text-dim);
            transform: translateY(-2px);
        }

        .help-content .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text);
        }

        .help-content .card-icon {
            font-size: 1.25rem;
        }

        .help-content .card-content {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .help-content .card-content a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }

        .help-content .card-content a:hover {
            color: var(--orange);
            text-decoration: underline;
        }

        .help-content .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .help-content .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .help-content .btn-primary {
            background: var(--orange);
            color: white;
            border: 1px solid var(--orange);
        }

        .help-content .btn-primary:hover {
            background: #d45e1a;
            border-color: #d45e1a;
            box-shadow: 0 0 12px rgba(232, 114, 42, 0.2);
        }

        .help-content .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .help-content .btn-secondary:hover {
            background: var(--card-hover);
            border-color: var(--text-dim);
        }

        /* 2. Slide-in Tools Menu Drawer */
        .drawer-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: var(--drawer-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-left: 1px solid var(--border);
            padding-top: env(safe-area-inset-top, 0px);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 40px rgba(0,0,0,0.5);
        }
        .drawer-menu.open {
            right: 0;
        }
        .drawer-header {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text);
            text-transform: uppercase;
        }
        .drawer-header h2 span:first-child {
            color: var(--orange);
        }
        .drawer-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .drawer-close:hover {
            color: var(--text);
        }
        .drawer-item-about {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            transition: all 0.2s;
            color: var(--text-dim);
            outline: none;
        }
        .drawer-item-about:hover, .drawer-item-about.active {
            color: var(--orange) !important;
        }
        .drawer-links {
            list-style: none;
            padding: 1rem 0;
            overflow-y: auto;
            flex: 1;
        }
        .drawer-item {
            padding: 0.15rem 0.75rem;
        }
        .drawer-item a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .drawer-item a:hover, .drawer-item.active a {
            color: var(--text);
            background: var(--active-item-bg);
            border-color: var(--active-item-border);
        }
        .drawer-item.active a {
            background: var(--active-item-bg);
            border-color: var(--orange);
            font-weight: 600;
        }
        .drawer-item .tool-icon {
            font-size: 1.15rem;
            min-width: 24px;
            text-align: center;
        }

        @media (max-width: 480px) {
            header {
                padding: 0 0.5rem;
            }
            .brand-logo {
                height: 30px;
                width: 30px;
            }
            .app-title {
                font-size: 0.85rem;
                letter-spacing: 0.03em;
            }
            .header-actions {
                gap: 0.5rem;
            }
            .action-btn {
                width: 32px;
                height: 32px;
            }
            .action-btn svg {
                width: 16px;
                height: 16px;
            }
        }

        @media (min-width: 1024px) {
            /* Keep drawer permanently open on the right */
            .drawer-menu {
                position: fixed;
                top: calc(var(--header-height) + env(safe-area-inset-top, 0px));
                right: 0 !important;
                width: 300px;
                height: calc(100% - var(--header-height) - env(safe-area-inset-top, 0px));
                border-left: 1px solid var(--border);
                border-top: none;
                box-shadow: none;
                background: var(--dark);
                transform: none !important;
            }
            /* Hide drawer close button */
            .drawer-close {
                display: none !important;
            }
            /* Hide the hamburger menu button in the header */
            .btn-menu {
                display: none !important;
            }
            /* Shrink content frame to make room for the persistent sidebar */
            .view-container {
                width: calc(100% - 300px);
            }
            /* Shrink help panel to align with the active content area */
            .help-panel {
                width: calc(100% - 300px) !important;
            }
        }

        /* ── THEME TOGGLE CONTROLS ── */
        .theme-switch-slider {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 22px;
        }
        .theme-switch-slider input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: var(--border);
            transition: .25s ease;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 4px;
            bottom: 4px;
            background-color: var(--text-dim);
            transition: .25s ease;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: rgba(59, 123, 246, 0.15);
            border: 1px solid rgba(59, 123, 246, 0.3);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
            background-color: var(--blue);
        }
        .drawer-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--dark);
        }
        .theme-btn-a {
            background: none;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            transition: all 0.2s;
            color: var(--text);
        }
        .theme-btn-a:hover {
            border-color: var(--text-muted);
            background: var(--hover-bg);
            transform: scale(1.05);
        }
    </style>
    <script src="js/tools-list.js"></script>
    <script src="js/sidebar.js"></script>
</head>
<body>

    <!-- STICKY HEADER -->
    <header>
        <div class="brand-logo" onclick="goHome()" title="Back to Dashboard">
            <img id="logo-img" src="app_icon.png" alt="Saturn FPV">
        </div>
        <div class="app-title" onclick="goHome()"><span>SATURN</span> FPV Tools</div>
        <div class="header-actions">
            <!-- Blue Question Mark Button -->
            <button class="action-btn btn-help" onclick="toggleHelp()" title="Help & Details">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </button>
            <!-- 3 Stripe Burger Menu Button -->
            <button class="action-btn btn-menu" onclick="window.sfpvSidebar.toggle()" title="Select Tool">
                <svg viewBox="0 0 24 24">
                    <line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- CONTENT FRAME -->
    <div class="view-container">
        <iframe id="app-iframe" src="menu.html" name="app-iframe"></iframe>
    </div>

    <!-- OVERLAY SHADOW -->
    <div class="overlay" id="app-overlay" onclick="closeAllOverlays()"></div>

    <!-- HELP SLIDE PANEL (from top) -->
    <div class="help-panel" id="help-panel">
        <div class="help-header">
            <h2><span>?</span> Tool Documentation</h2>
            <button class="help-close-btn" onclick="toggleHelp()">Close</button>
        </div>
        <div class="help-content" id="help-content">
            <!-- Dynamic Help Content Injected Here -->
        </div>
    </div>



    <!-- DYNAMIC HELP CONTENT STORAGE -->
    <script>
        const helpData = {};

        let currentActiveTool = 'home';

        function goHome() {
            if (currentActiveTool !== 'home') {
                document.getElementById('app-iframe').src = 'menu.html';
                updateActiveDrawer('home');
            }
            closeAllOverlays();
        }

        function toggleHelp() {
            const panel = document.getElementById('help-panel');
            const overlay = document.getElementById('app-overlay');
            const isOpen = panel.classList.contains('open');

            if (isOpen) {
                panel.classList.remove('open');
                overlay.classList.remove('visible');
            } else {
                // Load help text based on current active tool
                document.getElementById('help-content').innerHTML = helpData[currentActiveTool] || '<div class="about-container"><p style="text-align:center; color:var(--text-dim);">Loading help documentation...</p></div>';
                panel.classList.add('open');
                overlay.classList.add('visible');
                // Close drawer if open
                if (window.sfpvSidebar && window.sfpvSidebar.close) {
                    window.sfpvSidebar.close();
                }
            }
        }

        function toggleDrawer() {
            if (window.sfpvSidebar && window.sfpvSidebar.toggle) {
                window.sfpvSidebar.toggle();
            }
        }

        function closeAllOverlays() {
            document.getElementById('help-panel').classList.remove('open');
            if (window.sfpvSidebar && window.sfpvSidebar.close) {
                window.sfpvSidebar.close();
            }
            document.getElementById('app-overlay').classList.remove('visible');
        }

        function updateActiveDrawer(key) {
            currentActiveTool = key;
            if (window.sfpvSidebar && window.sfpvSidebar.updateActiveItem) {
                window.sfpvSidebar.updateActiveItem(key);
            }
        }

        function selectDrawerTool(src, key) {
            document.getElementById('app-iframe').src = src;
            updateActiveDrawer(key);
            closeAllOverlays();
        }

        // Catch messages from iframe when tool changes internally
        window.addEventListener('message', function(event) {
            const iframe = document.getElementById('app-iframe');
            if (iframe && event.source === iframe.contentWindow) {
                if (event.data) {
                    if (event.data.type === 'pageChange') {
                        updateActiveDrawer(event.data.key);
                    } else if (event.data.type === 'helpData') {
                        helpData[event.data.key] = event.data.html;
                    }
                }
            }
        });

        // ── THEME SWITCH SYSTEM ──
        let currentTheme = localStorage.getItem('fpv-tools-theme') || 'dark';

        function applyTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('fpv-tools-theme', theme);

            // Update DOM class
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }

            // Sync Android native system bars if available
            if (window.AndroidBridge && window.AndroidBridge.updateTheme) {
                window.AndroidBridge.updateTheme(theme);
            }

            // Sync dynamic sidebar checkbox
            const slider = document.getElementById('sfpv-theme-slider');
            if (slider) {
                slider.checked = (theme === 'dark');
            }

            // Propagate theme change to active iframe
            const iframe = document.getElementById('app-iframe');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'setTheme', theme: theme }, '*');
            }
        }

        function onSliderThemeChange(checkbox) {
            const nextTheme = checkbox.checked ? 'dark' : 'light';
            applyTheme(nextTheme);
        }

        // On load event
        document.addEventListener('DOMContentLoaded', function() {
            applyTheme(currentTheme);
        });

        // Ensure theme is synced with the native bridge once the window is fully loaded (and the bridge is injected)
        window.addEventListener('load', function() {
            if (window.AndroidBridge && window.AndroidBridge.updateTheme) {
                window.AndroidBridge.updateTheme(currentTheme);
            }
        });

        // Whenever the iframe finishes loading, push active theme configuration to it
        document.getElementById('app-iframe').addEventListener('load', function() {
            this.contentWindow.postMessage({ type: 'setTheme', theme: currentTheme }, '*');
        });
    </script>
</body>
</html>
